<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <title>DocuSign Signing</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    :root {
      --ink:        #0f1923;
      --ink-soft:   #4a5568;
      --ink-muted:  #a0aec0;
      --paper:      #f7f9fc;
      --white:      #ffffff;
      --accent:     #2563eb;
      --accent-dk:  #1d4ed8;
      --accent-lt:  #dbeafe;
      --success:    #059669;
      --success-lt: #d1fae5;
      --warn-lt:    #fef3c7;
      --warn:       #d97706;
      --danger-lt:  #fee2e2;
      --danger:     #dc2626;
      --border:     #e2e8f0;
      --radius:     12px;
      --radius-sm:  8px;
      --shadow:     0 1px 3px rgba(0,0,0,.08), 0 4px 16px rgba(0,0,0,.06);
      --shadow-lg:  0 8px 32px rgba(0,0,0,.12);
      --font:       'Inter', system-ui, -apple-system, sans-serif;
      --transition: 200ms cubic-bezier(.4,0,.2,1);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font); background: var(--paper); color: var(--ink); min-height: 100dvh; display: flex; flex-direction: column; }

    /* Header */
    header { background: var(--white); border-bottom: 1px solid var(--border); padding: 16px 20px; display: flex; align-items: center; gap: 12px; position: sticky; top: 0; z-index: 100; }
    .logo { width: 36px; height: 36px; background: var(--accent); border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .logo svg { width: 20px; height: 20px; }
    .header-text h1 { font-size: 1.1rem; font-weight: 700; }
    .header-text p  { font-size: .78rem; color: var(--ink-soft); margin-top: 1px; }
    .env-badge { margin-left: auto; font-size: .7rem; font-weight: 600; padding: 3px 8px; border-radius: 20px; background: var(--warn-lt); color: var(--warn); letter-spacing: .03em; text-transform: uppercase; flex-shrink: 0; }

    /* Layout */
    main { flex: 1; max-width: 480px; width: 100%; margin: 0 auto; padding: 32px 16px 48px; display: flex; flex-direction: column; gap: 20px; }

    /* Steps */
    .steps { display: flex; align-items: center; padding: 0 4px; }
    .step  { display: flex; flex-direction: column; align-items: center; gap: 4px; flex: 1; position: relative; }
    .step:not(:last-child)::after { content: ''; position: absolute; top: 14px; left: calc(50% + 14px); right: calc(-50% + 14px); height: 2px; background: var(--border); transition: background var(--transition); }
    .step.done:not(:last-child)::after { background: var(--accent); }
    .step-dot { width: 28px; height: 28px; border-radius: 50%; border: 2px solid var(--border); display: flex; align-items: center; justify-content: center; font-size: .75rem; font-weight: 600; background: var(--white); color: var(--ink-muted); transition: all var(--transition); z-index: 1; }
    .step.active .step-dot { border-color: var(--accent); color: var(--accent); background: var(--accent-lt); }
    .step.done   .step-dot { border-color: var(--accent); background: var(--accent); color: var(--white); }
    .step-label { font-size: .68rem; color: var(--ink-muted); font-weight: 500; text-align: center; }
    .step.active .step-label { color: var(--accent); }
    .step.done   .step-label { color: var(--ink-soft); }

    /* Card */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .card-header { padding: 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 12px; }
    .card-icon { width: 36px; height: 36px; border-radius: var(--radius-sm); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .card-icon.blue  { background: var(--accent-lt); color: var(--accent); }
    .card-icon.green { background: var(--success-lt); color: var(--success); }
    .card-body { padding: 24px; }

    /* Form */
    .field { display: flex; flex-direction: column; gap: 6px; }
    .field + .field { margin-top: 16px; }
    label { font-size: .82rem; font-weight: 600; color: var(--ink-soft); }
    input { font-family: var(--font); font-size: 1rem; padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--white); color: var(--ink); width: 100%; transition: border-color var(--transition), box-shadow var(--transition); appearance: none; }
    input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(37,99,235,.1); }
    input::placeholder { color: var(--ink-muted); }

    /* Button */
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; font-family: var(--font); font-size: .95rem; font-weight: 600; padding: 13px 20px; border-radius: var(--radius-sm); border: none; cursor: pointer; transition: all var(--transition); width: 100%; -webkit-tap-highlight-color: transparent; }
    .btn-primary { background: var(--accent); color: var(--white); }
    .btn-primary:hover:not(:disabled) { background: var(--accent-dk); }
    .btn-primary:active:not(:disabled) { transform: scale(.98); }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1.5px solid var(--border); }
    .btn-ghost:hover:not(:disabled) { background: var(--paper); }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .spinner { width: 18px; height: 18px; border: 2.5px solid rgba(255,255,255,.3); border-top-color: white; border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Alert */
    .alert { display: flex; gap: 10px; padding: 12px 14px; border-radius: var(--radius-sm); font-size: .84rem; line-height: 1.5; margin-bottom: 16px; }
    .alert-error   { background: var(--danger-lt);  color: #991b1b; }
    .alert-success { background: var(--success-lt); color: #065f46; }
    .alert-info    { background: var(--accent-lt);  color: #1e40af; }
    .alert svg { flex-shrink: 0; margin-top: 1px; }

    /* Signing iframe */
    #signing-wrapper { background: var(--white); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow-lg); overflow: hidden; display: none; }
    #signing-wrapper.visible { display: block; }
    .frame-topbar { padding: 10px 14px; background: var(--ink); display: flex; align-items: center; gap: 8px; }
    .dot { width: 10px; height: 10px; border-radius: 50%; }
    .dot-r { background: #ff5f57; } .dot-y { background: #ffbd2e; } .dot-g { background: #28c840; }
    .frame-url { flex: 1; background: rgba(255,255,255,.1); border-radius: 4px; padding: 3px 10px; font-size: .7rem; font-family: monospace; color: rgba(255,255,255,.6); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    #docusign-iframe { width: 100%; height: 70vh; min-height: 500px; border: none; display: block; }

    /* Complete */
    .complete-card { text-align: center; padding: 40px 24px; }
    .complete-icon { width: 72px; height: 72px; background: var(--success-lt); border-radius: 50%; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; }
    .summary-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid var(--border); font-size: .88rem; }
    .summary-row:last-child { border-bottom: none; }
    .summary-label { color: var(--ink-soft); }

    footer { text-align: center; padding: 16px; font-size: .75rem; color: var(--ink-muted); border-top: 1px solid var(--border); }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fadein { animation: fadeUp .25s ease both; }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M9 12h6M9 16h6M9 8h6M5 4h14a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2z"/>
      <path d="m15 2-3 3-3-3"/>
    </svg>
  </div>
  <div class="header-text">
    <h1>DocuSign Signing</h1>
    <p>Powered by JWT grant &middot; Embedded signing</p>
  </div>
  <span class="env-badge" id="env-badge">Demo</span>
</header>

<main>

  <!-- Steps -->
  <div class="card fadein" style="padding: 16px 20px;">
    <div class="steps">
      <div class="step active" id="step-1"><div class="step-dot">1</div><div class="step-label">Details</div></div>
      <div class="step" id="step-2"><div class="step-dot">2</div><div class="step-label">Sign</div></div>
      <div class="step" id="step-3"><div class="step-dot">&#10003;</div><div class="step-label">Done</div></div>
    </div>
  </div>

  <!-- Step 1: Signer details -->
  <div id="panel-signer" class="fadein">
    <div class="card">
      <div class="card-header">
        <div class="card-icon blue">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
          </svg>
        </div>
        <div>
          <div style="font-size:1.05rem;font-weight:600;">Who is signing?</div>
          <div style="font-size:.78rem;color:var(--ink-soft);margin-top:2px;">Enter the signer&rsquo;s details to begin</div>
        </div>
      </div>
      <div class="card-body">
        <div id="alert-signer"></div>
        <div class="field">
          <label for="signerName">Full name</label>
          <input type="text" id="signerName" placeholder="Jane Smith" autocomplete="name" />
        </div>
        <div class="field">
          <label for="signerEmail">Email address</label>
          <input type="email" id="signerEmail" placeholder="jane@example.com" autocomplete="email" />
        </div>
        <button class="btn btn-primary" style="margin-top:24px;" id="btn-start">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
          Start Signing
        </button>
      </div>
    </div>
  </div>

  <!-- Step 2: Embedded signing iframe -->
  <div id="signing-wrapper">
    <div class="frame-topbar">
      <div class="dot dot-r"></div>
      <div class="dot dot-y"></div>
      <div class="dot dot-g"></div>
      <div class="frame-url" id="frame-url-display">Loading DocuSign&hellip;</div>
    </div>
    <iframe id="docusign-iframe"
      title="DocuSign Embedded Signing"
      allow="camera; microphone"
      sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-top-navigation">
    </iframe>
  </div>

  <!-- Step 3: Complete -->
  <div id="panel-complete" style="display:none;" class="fadein">
    <div class="card">
      <div class="complete-card">
        <div class="complete-icon">
          <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="var(--success)" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
        </div>
        <div style="font-size:1.3rem;font-weight:700;color:var(--success);">Document Signed!</div>
        <div style="color:var(--ink-soft);margin-top:8px;font-size:.9rem;">DocuSign will email copies to all parties.</div>
        <div id="complete-summary" style="margin-top:24px;background:var(--paper);border:1px solid var(--border);border-radius:var(--radius-sm);padding:4px 16px;text-align:left;"></div>
        <button class="btn btn-ghost" style="margin-top:20px;max-width:260px;" id="btn-sign-another">Sign another document</button>
      </div>
    </div>
  </div>

</main>

<footer>
  Embedded Signing &middot; DocuSign JWT Grant &middot;
  <a href="https://developers.docusign.com/docs/esign-rest-api/how-to/embedded-signing/" target="_blank" style="color:var(--accent);text-decoration:none;">Docs &#8599;</a>
</footer>
<script type="text/javascript" src="/js/app.js">
</body>
</html>
